<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف الطالب — متابعة أولياء الأمور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#152238;
    --ink2:#23375A;
    --paper:#EEF0EA;
    --paper2:#F7F8F4;
    --card:#FFFFFF;
    --line:#D8D4C4;
    --brass:#A87C2E;
    --brass-light:#D9B568;
    --good:#2F7A52;
    --good-bg:#E6F2EB;
    --warn:#B23A2E;
    --warn-bg:#FBEAE8;
    --late:#9A7B1E;
    --late-bg:#FBF3DC;
    --muted:#5B6470;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
    background-image:linear-gradient(var(--paper) 1px, transparent 1px);
    background-size: 100% 42px;
    background-attachment:local;
  }
  #app{max-width:980px;margin:0 auto;padding:24px 18px 60px;}
  h1,h2,h3{font-family:'Cairo',sans-serif;margin:0;}
  .eyebrow{
    font-family:'Tajawal',sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:.5px;
    color:var(--brass);
    text-transform:uppercase;
  }
  a{color:inherit; text-decoration: none;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  /* ===== Header / brand ===== */
  .brandbar{
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;padding:18px 22px;background:var(--ink);
    border-radius:var(--radius);color:#fff;position:relative;overflow:hidden;
    margin-bottom:22px;
  }
  .brandbar svg.compass{position:absolute;left:-30px;top:-40px;opacity:.10;width:180px;height:180px;}
  .brand-id{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}
  .avatar{
    width:56px;height:56px;border-radius:50%;
    background:linear-gradient(135deg,var(--brass-light),var(--brass));
    display:flex;align-items:center;justify-content:center;
    font-family:'Cairo',sans-serif;font-weight:800;font-size:20px;color:var(--ink);
    flex-shrink:0;border:2px solid rgba(255,255,255,.35);
    overflow:hidden;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .brand-name{font-size:18px;font-weight:800;}
  .brand-sub{font-size:12.5px;color:#C9D2E0;margin-top:2px;}
  
  .tagline{
    position:relative;z-index:1;text-align:left;
    font-family:'Cairo',sans-serif;font-weight:800;font-size:14px;
    line-height:1.5;flex-shrink:0;
    display: flex;flex-direction: column;gap: 6px;align-items: flex-end;
  }
  .tagline .phone-num {
    color:var(--brass-light);font-size:15px;direction: ltr;display: inline-block;
  }
  .social-grid { display: flex; gap: 8px; margin-top: 4px; }
  .social-icon {
    display: flex;align-items: center;justify-content: center;
    width: 32px;height: 32px;border-radius: 50%;
    color: #fff;font-size: 14px;transition: all 0.2s ease;
  }
  .social-icon.yt { background: #FF0000; }
  .social-icon.tg { background: #0088cc; }
  .social-icon.web { background: var(--brass); font-size: 16px; }
  .social-icon:hover { transform: translateY(-2px); opacity: 0.9; }

  /* ===== Student Avatar inside Report ===== */
  .student-profile { display: flex; align-items: center; gap: 16px; padding: 6px 0; }
  .student-avatar {
    width: 64px; height: 64px; border-radius: 50%; background: #ddd;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
    overflow: hidden; border: 2px solid var(--line); flex-shrink: 0;
  }
  .student-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* ===== Generic card ===== */
  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:22px;margin-bottom:18px;
    box-shadow:0 1px 2px rgba(21,34,56,.04);
  }
  .card-title{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .card-title div{display:flex;align-items:center;gap:8px;}
  .card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--brass);}

  /* ===== Home / Leaderboard ===== */
  .hero{text-align:center;padding:36px 16px 8px;}
  .hero h1{font-size:26px;font-weight:900;margin-bottom:8px;}
  .hero p{color:var(--muted);font-size:14.5px;max-width:480px;margin:0 auto;}
  .code-form{display:flex;gap:8px;max-width:380px;margin:26px auto 6px;}
  .code-form input{
    flex:1;padding:13px 16px;border-radius:10px;border:1.5px solid var(--line);
    font-size:18px;letter-spacing:3px;text-align:center;font-weight:700;
    background:var(--paper2);color:var(--ink);
  }
  .code-form input:focus{outline:none;border-color:var(--brass);}
  
  .leaderboard-table { width: 100%; margin-top: 10px; text-align: right; border-collapse: collapse; }
  .leaderboard-table th { padding: 10px 6px; font-weight: bold; }
  .leaderboard-table td { padding: 12px 6px; }
  .leaderboard-rank { font-weight: 900; color: var(--brass); width: 50px; font-size: 16px; }
  .star-count { color: #A87C2E; font-weight: bold; }

  /* ===== Danger Indicator ===== */
  .danger-badge {
    background: var(--warn-bg); color: var(--warn); padding: 2px 6px; border-radius: 6px; font-size: 11px; font-weight: bold; display: inline-flex; align-items: center; gap: 3px;
  }

  .btn{
    padding:12px 20px;border-radius:10px;border:none;font-weight:700;font-size:14.5px;
    background:var(--ink);color:#fff;transition:opacity .15s;
  }
  .btn:hover{opacity:.88;}
  .btn-brass{background:var(--brass);color:#fff;}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
  .btn-danger{background:var(--warn);color:#fff;}
  .btn-sm{padding:8px 13px;font-size:13px;border-radius:8px;}
  .btn-wa { background: #25D366; color: #fff; display: inline-flex; align-items: center; gap: 6px; justify-content: center; }
  .hint{font-size:12.5px;color:var(--muted);text-align:center;margin-top:10px;}
  .footer-link{display:block;text-align:center;margin-top:34px;font-size:13px;color:var(--muted);text-decoration:underline;cursor:pointer;}

  /* ===== Stat row ===== */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;text-align:center;}
  .stat .num{font-family:'Cairo',sans-serif;font-weight:900;font-size:24px;}
  .stat .lbl{font-size:12.5px;color:var(--muted);margin-top:4px;}
  .stat.good .num{color:var(--good);}
  .stat.warn .num{color:var(--warn);}

  /* ===== Lists / rows ===== */
  .row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 4px;border-bottom:1px dashed var(--line);font-size:14px;
  }
  .row:last-child{border-bottom:none;}
  .row .meta{color:var(--muted);font-size:12.5px;}
  .badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;}
  .badge.present{background:var(--good-bg);color:var(--good);}
  .badge.absent{background:var(--warn-bg);color:var(--warn);}
  .badge.late{background:var(--late-bg);color:var(--late);}
  .badge.paid{background:var(--good-bg);color:var(--good);}
  .badge.due{background:var(--warn-bg);color:var(--warn);}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{font-family:'Cairo',sans-serif;font-size:12.5px;color:var(--muted);text-align:right;padding:8px 6px;border-bottom:2px solid var(--line);}
  td{padding:9px 6px;border-bottom:1px dashed var(--line);}
  tr:last-child td{border-bottom:none;}

  /* ===== Forms ===== */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:10px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
  .field input,.field select{
    width:100%;padding:9px 10px;border-radius:8px;border:1.3px solid var(--line);
    background:var(--paper2);font-size:13.5px;color:var(--ink);
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--brass);}

  .topnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .back{font-size:13.5px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;}
  .back:hover{color:var(--ink);}

  .student-pick{display:flex;align-items:center;justify-content:space-between;padding:13px 6px;border-bottom:1px dashed var(--line);}
  .student-pick:last-child{border-bottom:none;}
  .student-pick .nm{font-weight:700;font-size:14.5px;}
  .student-pick .cd{font-family:'Cairo',sans-serif;font-weight:800;letter-spacing:2px;color:var(--brass);font-size:13px;}

  .pin-box{max-width:260px;margin:0 auto;}
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:30px;
    font-size:13.5px;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,.2);
    opacity:0;pointer-events:none;transition:opacity .25s, bottom .25s;
  }
  .toast.show{opacity:1;bottom:30px;}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:18px 0;}

  @media(max-width:560px){
    .stats{grid-template-columns:1fr 1fr;}
    .code-form{flex-direction:column;}
    .brandbar { flex-direction: column; text-align: center; }
    .tagline { align-items: center; }
  }

  /* ===== Animated background ===== */
  #bgfx{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  #bgfx .bigCompass{ position:absolute; top:-12vw; right:-12vw; width:46vw; height:46vw; max-width:520px; max-height:520px; opacity:.05; animation: spin 120s linear infinite; }
  #bgfx .bigCompass2{ position:absolute; bottom:-16vw; left:-16vw; width:38vw; height:38vw; max-width:420px; max-height:420px; opacity:.045; animation: spin 160s linear infinite reverse; }
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  #app{position:relative; z-index:1;}
  .brandbar, .toast{ position:relative; z-index:1; }
</style>
</head>
<body>
<div id="bgfx"></div>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ إعدادات المعلم ============ */
const TEACHER = {
  name: 'فادي فرح',
  subject: 'مدرس الدراسات الاجتماعية',
  photo: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCT/AARCAEsASwDASIAAhEBAxEB/8QAHQAAAQUBAQEBAAAAAAAAAAAABgIDBAUHCAEACf/EAEcQAAIBAwIEBAQDBQQIBQUBAQECAwAEEQUhBhIxQQcTUWEUInGBMpGhCHANGED00666666s19e666oNfC4lttZl07SbOK9htNNjaGIizeds0rGXLuwH4d1GB29qG47e4E+LHVL2ERgMWMnOM/wAId/vVDq2uT6s02rTAqZ7yWU8pzen7Y7EUFmwAjCE4lfzN+vT/DA+1bsODFKKi4mbNlyRfJMrLu21OGLl/tZm5RyrmMY/Dy4/IAfar7w2srjWoNWvPPlbVNMMUkaxgENGxK864/iV+VsegIqt1TMTFwOaM7MP61d+DWtQ8N8W3yoCZLqAPEr7qSjc/X8vypWfBjhuK6GYc8🔴', 
  pin: '1234'

/* ===================================================== */

let state = { view:'home', code:'', student:null, teacherAuthed:false, index:[], editingCode:null, msg:'' };

const $app = document.getElementById('app');
const $toast = document.getElementById('toast');
function toast(msg){ $toast.textContent=msg; $toast.classList.add('show'); setTimeout(()=>$toast.classList.remove('show'),2200); }

/* ---------------- Storage helpers (Firebase Realtime Database) ---------------- */
const DB_URL = 'https://fady-portal01-default-rtdb.firebaseio.com';

async function dbGet(path){
  try{
    const r = await fetch(DB_URL + '/' + path + '.json');
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}
async function dbSet(path, value){
  try{
    const r = await fetch(DB_URL + '/' + path + '.json', {
      method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(value)
    });
    return r.ok;
  }catch(e){ return false; }
}
async function dbDelete(path){
  try{
    const r = await fetch(DB_URL + '/' + path + '.json', { method:'DELETE' });
    return r.ok;
  }catch(e){ return false; }
}

async function getIndex(){ const v = await dbGet('index'); return v || []; }
async function saveIndex(list){ const ok = await dbSet('index', list); if(!ok) toast('حصل خطأ في الحفظ'); }
async function getStudent(code){ return await dbGet('students/'+code); }
async function saveStudent(code, data){ const ok = await dbSet('students/'+code, data); if(!ok) toast('حصل خطأ في الحفظ'); }

function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<5;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

/* ---------------- Calc & Logic Helpers ---------------- */
function attendanceStats(att){
  att = att||[];
  const total = att.length;
  const present = att.filter(a=>a.status==='present').length;
  const absent = att.filter(a=>a.status==='absent').length;
  const late = att.filter(a=>a.status==='late').length;
  const pct = total? Math.round((present/total)*100) : 100;
  return {total,present,absent,late,pct};
}
function examsAvg(exams){
  exams = exams||[];
  if(!exams.length) return null;
  let sumPct=0;
  exams.forEach(e=> sumPct += (Number(e.score)/Number(e.max))*100 );
  return Math.round(sumPct/exams.length);
}
function paymentsSummary(payments){
  payments = payments||[];
  let paid=0, due=0;
  payments.forEach(p=>{ if(p.status==='paid') paid+=Number(p.amount); else due+=Number(p.amount); });
  return {paid,due};
}
function fmtDate(d){ if(!d) return '—'; return d; }

function calcPoints(s) {
  let points = 0;
  if(s.exams) {
    s.exams.forEach(e => {
      if((Number(e.score)/Number(e.max)) >= 0.85) points += 1;
    });
  }
  return points;
}

function checkDanger(s) {
  let consecutiveAbsents = 0;
  if(s.attendance) {
    const sortedAtt = s.attendance.slice().sort((a,b) => new Date(a.date) - new Date(b.date));
    for(let i = sortedAtt.length - 1; i >= 0; i--) {
      if(sortedAtt[i].status === 'absent') consecutiveAbsents++;
      else break;
    }
  }
  let consecutiveBadGrades = 0;
  if(s.exams) {
    const sortedExams = s.exams.slice().sort((a,b) => new Date(a.date) - new Date(b.date));
    for(let i = sortedExams.length - 1; i >= 0; i--) {
      if((Number(sortedExams[i].score)/Number(sortedExams[i].max)) < 0.5) consecutiveBadGrades++;
      else break;
    }
  }
  return (consecutiveAbsents >= 3 || consecutiveBadGrades >= 3);
}

function sendWhatsApp(phone, message) {
  if(!phone) { toast('رقم ولي الأمر غير مسجل لهذا الطالب!'); return; }
  let cleanPhone = phone.trim().replace(/\s+/g, '');
  if(cleanPhone.startsWith('01')) cleanPhone = '2' + cleanPhone;
  const url = `https://api.whatsapp.com/send?phone=${cleanPhone}&text=${encodeURIComponent(message)}`;
  window.open(url, '_blank');
}

function buildBgFx(){
  const el = document.getElementById('bgfx'); if(!el || el.dataset.built) return; el.dataset.built = '1';
  const compassSvg = (cls)=>`<svg class="${cls}" viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="92" stroke="#A87C2E" stroke-width="1.4"/><circle cx="100" cy="100" r="58" stroke="#A87C2E" stroke-width="1"/><line x1="100" y1="3" x2="100" y2="197" stroke="#A87C2E" stroke-width="1"/><line x1="3" y1="100" x2="197" y2="100" stroke="#A87C2E" stroke-width="1"/><path d="M100 16 L110 100 L100 184 L90 100 Z" fill="#A87C2E"/></svg>`;
  el.innerHTML = compassSvg('bigCompass') + compassSvg('bigCompass2');
}

/* ---------------- Components ---------------- */
function brandbar(small){
  return `
  <div class="brandbar">
    <div class="brand-id">
      <div class="avatar"><img src="${TEACHER.photo}" alt="${TEACHER.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='📷';"></div>
      <div>
        <div class="brand-name">مستر ${TEACHER.name}</div>
        <div class="brand-sub">${TEACHER.subject} · كشف متابعة الطالب</div>
      </div>
    </div>
    ${small? '' : `
    <div class="tagline">
      <a href="tel:01280051285" class="phone-num">📞 01280051285</a>
      <div class="social-grid">
        <a href="https://www.youtube.com/@Mr_Fady_Farah" target="_blank" class="social-icon yt" title="يوتيوب">
          <svg style="width:16px;height:16px;fill:white;margin-top:8px;" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </a>
        <a href="https://t.me/mrfadyfarah" target="_blank" class="social-icon tg" title="تيليجرام">
          <svg style="width:16px;height:16px;fill:white;margin-top:8px;" viewBox="0 0 24 24"><path d="M12 24c6.627 0 12-5.373 12-12S18.627 0 12 0 0 5.373 0 12s5.373 12 12 12zm5.894-17.435c.116.619-.46 3.978-1.077 7.279-.26 1.396-.777 1.864-1.275 1.91-1.083.1-1.905-.716-2.954-1.404-1.64-1.077-2.566-1.737-4.156-2.785-1.838-1.212-.647-1.878.401-2.967.274-.285 5.043-4.625 5.135-5.017.114-.49-.184-.712-.749-.335-.784.523-13.179 8.706-13.561 8.961-.362.242-.69.36-.983.351-.323-.01-.943-.185-1.404-.335-.565-.184-1.012-.282-.973-.596.02-.164.246-.334.675-.508 2.641-1.152 16.05-6.732 16.48-6.917.43-.185.8-.228.92-.128z"/></svg>
        </a>
        <a href="https://mr-fady.academodo.com/" target="_blank" class="social-icon web" title="المنصة التعليمية">🎓</a>
      </div>
    </div>`}
  </div>`;
}

/* ---------------- Views ---------------- */
async function renderHome(){
  $app.innerHTML = `
    ${brandbar(false)}
    <div class="hero">
      <div class="eyebrow">بوابة أولياء الأمور</div>
      <h1>اطمئن على مستوى ابنك أول بأول</h1>
      <p>أدخل الكود الخاص بالطالب لمتابعة الحضور، درجات الامتحانات، وحالة المصروفات.</p>
      <form class="code-form" id="codeForm">
        <input type="text" id="codeInput" placeholder="ادخل الكود" maxlength="6" autocomplete="off">
        <button class="btn btn-brass" type="submit">عرض الكشف</button>
      </form>
    </div>
    
    <div class="card" id="leaderboardCard" style="display:none;">
      <div class="card-title"><div><span class="dot"></span> 🏆 لوحة الشرف - أفضل 10 شطار في السنتر كله</div></div>
      <table class="leaderboard-table">
        <thead><tr><th>الترتيب</th><th>اسم الطالب</th><th>الصف</th><th>النقاط والنجوم</th></tr></thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </div>

    <div class="footer-link" id="teacherLink">دخول المعلم</div>
  `;
  
  document.getElementById('codeForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const v = document.getElementById('codeInput').value.trim().toUpperCase();
    if(!v) return; await openReport(v);
  });
  document.getElementById('teacherLink').addEventListener('click', ()=>{ state.view='teacherLogin'; render(); });

  const idx = await getIndex();
  if(idx.length > 0) {
    let fullStudents = [];
    for(const s of idx) {
      const data = await getStudent(s.code);
      if(data) {
        fullStudents.push({ name: s.name, klass: s.klass, points: calcPoints(data) });
      }
    }
    fullStudents.sort((a,b) => b.points - a.points);
    const top10 = fullStudents.slice(0, 10);
    
    const tbody = document.getElementById('leaderboardBody');
    tbody.innerHTML = top10.map((s, i) => `
      <tr>
        <td class="leaderboard-rank">#${i+1}</td>
        <td><strong>${s.name}</strong></td>
        <td>${s.klass || '—'}</td>
        <td class="star-count">${s.points} ⭐</td>
      </tr>
    `).join('');
    if(top10.length > 0) document.getElementById('leaderboardCard').style.display = 'block';
  }
}

async function openReport(code){
  const data = await getStudent(code);
  if(!data){ toast('الكود غير صحيح، تأكد منه مع المدرّس'); return; }
  state.code = code; state.student = data; state.view='report';
  history.replaceState(null,'', location.pathname+'?code='+code);
  render();
}

function renderReport(){
  const s = state.student;
  const att = attendanceStats(s.attendance);
  const avg = examsAvg(s.exams);
  const pay = paymentsSummary(s.payments);
  const points = calcPoints(s);

  $app.innerHTML = `
    ${brandbar(false)}
    <div class="topnav"><div class="back" id="toHome">→ بحث بكود تاني</div></div>
    <div class="card">
      <div class="card-title"><span class="dot"></span> بيانات الطالب</div>
      <div class="student-profile">
        <div class="student-avatar">
          ${s.photoUrl ? `<img src="${s.photoUrl}" alt="${s.name}">` : `👤`}
        </div>
        <div>
          <div style="font-size:16px; font-weight:bold; color:var(--ink);">${s.name}</div>
          <div class="meta" style="margin-top:4px;">الصف: ${s.klass||'—'} · الكود: ${state.code}</div>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat ${att.pct>=85?'good':'warn'}"><div class="num">${att.pct}%</div><div class="lbl">نسبة الحضور</div></div>
      <div class="stat ${avg===null?'':(avg>=65?'good':'warn')}"><div class="num">${avg===null?'—':avg+'%'}</div><div class="lbl">متوسط الامتحانات</div></div>
      <div class="stat" style="color:#A87C2E;"><div class="num">${points} ⭐</div><div class="lbl">إجمالي النقاط</div></div>
      <div class="stat ${pay.due>0?'warn':'good'}"><div class="num">${pay.due} ج</div><div class="lbl">متبقي مصروفات</div></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> سجل الحضور والغياب</div>
      ${ (s.attendance&&s.attendance.length) ? s.attendance.slice().reverse().map(a=>`
          <div class="row"><span>${fmtDate(a.date)}</span><span class="badge ${a.status}">${a.status==='present'?'حاضر':a.status==='absent'?'غائب':'متأخر'}</span></div>
        `).join('') : `<div class="empty">لا يوجد سجل حضور بعد</div>` }
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> الامتحانات والبوينتس</div>
      ${ (s.exams&&s.exams.length) ? `
        <table><thead><tr><th>الامتحان</th><th>التاريخ</th><th>الدرجة</th><th>مكافأة النجوم</th></tr></thead>
        <tbody>
        ${s.exams.slice().reverse().map(e=>`<tr><td>${e.name}</td><td>${fmtDate(e.date)}</td><td>${e.score} / ${e.max}</td><td>${(Number(e.score)/Number(e.max))>=0.85?'⭐ نقطة تفوق': '—'}</td></tr>`).join('')}
        </tbody></table>
      ` : `<div class="empty">لا يوجد امتحانات مسجّلة بعد</div>` }
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> المصروفات</div>
      ${ (s.payments&&s.payments.length) ? s.payments.slice().reverse().map(p=>`
          <div class="row"><span>${p.term} <span class="meta">— ${fmtDate(p.date)}</span></span><span style="display:flex;align-items:center;gap:8px;"><span class="meta">${p.amount} جنيه</span><span class="badge ${p.status==='paid'?'paid':'due'}">${p.status==='paid'?'مدفوع':'غير مدفوع'}</span></span></div>
        `).join('') : `<div class="empty">لا يوجد سجل مدفوعات بعد</div>` }
    </div>
  `;
  document.getElementById('toHome').addEventListener('click', ()=>{ state.view='home'; history.replaceState(null,'',location.pathname); render(); });
}

function renderTeacherLogin(){
  $app.innerHTML = `
    ${brandbar(true)}
    <div class="topnav"><div class="back" id="toHome">→ رجوع</div></div>
    <div class="card pin-box">
      <div class="card-title"><span class="dot"></span> دخول المعلم</div>
      <form id="pinForm">
        <div class="field" style="margin-bottom:12px;"><label>كود الدخول</label><input type="password" id="pinInput" placeholder="••••"></div>
        <button class="btn btn-brass" style="width:100%;" type="submit">دخول</button>
      </form>
    </div>
  `;
  document.getElementById('toHome').addEventListener('click', ()=>{ state.view='home'; render(); });
  document.getElementById('pinForm').addEventListener('submit', (e)=>{
    e.preventDefault();
    if(document.getElementById('pinInput').value === TEACHER.pin){ state.teacherAuthed = true; state.view='teacherPanel'; render(); } 
    else { toast('الكود غير صحيح'); }
  });
}

async function renderTeacherPanel(){
  state.index = await getIndex();
  
  let studentsHTML = '';
  for(const s of state.index) {
    const data = await getStudent(s.code);
    const isDanger = data ? checkDanger(data) : false;
    studentsHTML += `
      <div class="student-pick">
        <div>
          <div class="nm">${s.name} ${isDanger ? '<span class="danger-badge">⚠️ خطر</span>' : ''}</div>
          <div class="meta">${s.klass||'—'} ${s.parentPhone ? ' · ولي الأمر: ' + s.parentPhone : ''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="cd">${s.code}</span>
          <button class="btn btn-ghost btn-sm" data-edit="${s.code}">إدارة</button>
        </div>
      </div>
    `;
  }

  $app.innerHTML = `
    ${brandbar(true)}
    <div class="topnav"><div class="back" id="toHome">→ خروج</div><strong style="font-size:14px;">لوحة المعلم</strong></div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> إضافة طالب جديد</div>
      <form id="addForm" class="form-grid" style="align-items:end;">
        <div class="field"><label>اسم الطالب</label><input type="text" id="newName" required></div>
        <div class="field"><label>الصف</label><input type="text" id="newClass" placeholder="مثال: 3 إعدادي"></div>
        <div class="field"><label>رقم ولي الأمر</label><input type="text" id="newParentPhone" placeholder="01xxxxxxxxx"></div>
        <div class="field"><label>رابط صورة الطالب (اختياري)</label><input type="text" id="newPhotoUrl" placeholder="http://..."></div>
        <div class="field"><label>الكود (اختياري)</label><input type="text" id="newCode" maxlength="6" placeholder="تلقائي" style="text-transform:uppercase;"></div>
        <button class="btn btn-brass" type="submit">إضافة</button>
      </form>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> الطلاب (${state.index.length})</div>
      ${ state.index.length ? studentsHTML : `<div class="empty">لسه مفيش طلاب — ضيف أول طالب من فوق</div>` }
    </div>
  `;
  
  document.getElementById('toHome').addEventListener('click', ()=>{ state.teacherAuthed=false; state.view='home'; render(); });
  document.getElementById('addForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const name = document.getElementById('newName').value.trim();
    const klass = document.getElementById('newClass').value.trim();
    const parentPhone = document.getElementById('newParentPhone').value.trim();
    const photoUrl = document.getElementById('newPhotoUrl').value.trim();
    const manualCode = document.getElementById('newCode').value.trim().toUpperCase();
    if(!name) return;
    const idx = await getIndex();
    let code = manualCode || genCode();
    while(idx.find(x=>x.code===code)) code = genCode();
    
    idx.push({name, klass, code, parentPhone, photoUrl});
    await saveIndex(idx);
    await saveStudent(code, {name, klass, parentPhone, photoUrl, attendance:[], exams:[], payments:[]});
    toast('تم إضافة الطالب بنجاح'); renderTeacherPanel();
  });

  $app.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ state.editingCode = btn.dataset.edit; state.view='studentEditor'; render(); });
  });
}

async function renderStudentEditor(){
  const code = state.editingCode;
  const s = await getStudent(code);
  if(!s){ toast('الطالب غير موجود'); state.view='teacherPanel'; render(); return; }

  const link = location.origin + location.pathname + '?code=' + code;
  const isDanger = checkDanger(s);

  $app.innerHTML = `
    ${brandbar(true)}
    <div class="topnav"><div class="back" id="toPanel">→ كل الطلاب</div><strong>${s.name} ${isDanger ? '<span class="danger-badge">⚠️ مؤشر خطر نشط</span>' : ''}</strong></div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> رابط متابعة ولي الأمر</div>
      <div class="row"><span class="cd">${code}</span><button class="btn btn-ghost btn-sm" id="copyLink">نسخ الرابط</button></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> مراسلة ولي الأمر عبر الواتساب الفوري</div>
      <div class="form-grid">
         <button class="btn btn-wa btn-sm" id="waExam">📝 إرسال آخر نتيجة</button>
         <button class="btn btn-wa btn-sm" id="waAtt">🔴 إرسال حالة الحضور</button>
         <button class="btn btn-wa btn-sm" id="waPay">💰 إرسال إيصال دفع</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> تعديل رابط صورة الطالب</div>
      <form id="editPhotoForm" class="form-grid" style="align-items:end;">
        <div class="field"><label>رابط الصورة الحالي</label><input type="text" id="editPhotoUrl" value="${s.photoUrl || ''}" placeholder="ضع رابط الصورة هنا"></div>
        <button class="btn btn-brass" type="submit">تحديث الصورة</button>
      </form>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> تسجيل حضور</div>
      <form id="attForm" class="form-grid">
        <div class="field"><label>التاريخ</label><input type="date" id="attDate" required></div>
        <div class="field"><label>الحالة</label><select id="attStatus"><option value="present">حاضر</option><option value="absent">غائب</option><option value="late">متأخر</option></select></div>
        <button class="btn btn-brass" type="submit">تسجيل</button>
      </form>
      ${ (s.attendance&&s.attendance.length) ? s.attendance.slice().reverse().map((a,ri)=>{
          const i = s.attendance.length-1-ri;
          return `<div class="row"><span>${a.date}</span><span style="display:flex;align-items:center;gap:8px;"><span class="badge ${a.status}">${a.status==='present'?'حاضر':a.status==='absent'?'غائب':'متأخر'}</span><button class="btn btn-ghost btn-sm" data-del-att="${i}">حذف</button></span></div>`;
        }).join('') : `<div class="empty">لا يوجد سجل بعد</div>` }
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> إضافة درجة امتحان</div>
      <form id="examForm" class="form-grid">
        <div class="field"><label>اسم الامتحان</label><input type="text" id="examName" placeholder="امتحان شهر" required></div>
        <div class="field"><label>التاريخ</label><input type="date" id="examDate"></div>
        <div class="field"><label>الدرجة</label><input type="number" id="examScore" required></div>
        <div class="field"><label>من</label><input type="number" id="examMax" value="100" required></div>
        <button class="btn btn-brass" type="submit">إضافة</button>
      </form>
      ${ (s.exams&&s.exams.length) ? s.exams.slice().reverse().map((e,ri)=>{
          const i = s.exams.length-1-ri;
          return `<div class="row"><span>${e.name}</span><span style="display:flex;align-items:center;gap:8px;"><strong>${e.score}/${e.max} ${(Number(e.score)/Number(e.max))>=0.85?'⭐':''}</strong><button class="btn btn-ghost btn-sm" data-del-exam="${i}">حذف</button></span></div>`;
        }).join('') : `<div class="empty">لا يوجد امتحانات بعد</div>` }
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span> تسجيل مصروفات</div>
      <form id="payForm" class="form-grid">
        <div class="field"><label>البيان</label><input type="text" id="payTerm" placeholder="حصة / شهر" required></div>
        <div class="field"><label>المبلغ</label><input type="number" id="payAmount" required></div>
        <div class="field"><label>الحالة</label><select id="payStatus"><option value="paid">مدفوع</option><option value="due">غير مدفوع</option></select></div>
        <div class="field"><label>التاريخ</label><input type="date" id="payDate"></div>
        <button class="btn btn-brass" type="submit">تسجيل</button>
      </form>
      ${ (s.payments&&s.payments.length) ? s.payments.slice().reverse().map((p,ri)=>{
          const i = s.payments.length-1-ri;
          return `<div class="row"><span>${p.term} <span class="meta">— ${p.date||'—'}</span></span><span style="display:flex;align-items:center;gap:8px;"><span class="meta">${p.amount} ج</span><span class="badge ${p.status==='paid'?'paid':'due'}">${p.status==='paid'?'مدفوع':'غير مدفوع'}</span></span></div>`;
        }).join('') : `<div class="empty">لا يوجد سجل مدفوعات بعد</div>` }
    </div>
    <div class="card"><button class="btn btn-danger" id="delStudent">حذف الطالب نهائيًا</button></div>
  `;

  document.getElementById('toPanel').addEventListener('click', ()=>{ state.view='teacherPanel'; render(); });
  document.getElementById('copyLink').addEventListener('click', async ()=>{ await navigator.clipboard.writeText(link); toast('تم نسخ الرابط'); });

  document.getElementById('editPhotoForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    s.photoUrl = document.getElementById('editPhotoUrl').value.trim();
    await saveStudent(code, s);
    toast('تم تحديث صورة الطفل بنجاح');
    renderStudentEditor();
  });

  document.getElementById('waExam').addEventListener('click', () => {
    if(!s.exams || !s.exams.length) { toast('لا توجد امتحانات مسجلة لهذا الطالب'); return; }
    const last = s.exams[s.exams.length - 1];
    const msg = `تحية طيبة من مستر فادي فرح لدعم مادة الدراسات.\nنود إحاطتكم علماً بأن ابنكم الطالب/ة (${s.name}) قد حصل في اختبار (${last.name}) على درجة: ${last.score} من ${last.max}. بالتوفيق!`;
    sendWhatsApp(s.parentPhone, msg);
  });
  document.getElementById('waAtt').addEventListener('click', () => {
    if(!s.attendance || !s.attendance.length) { toast('لا يوجد سجل حضور مسجل لهذا الطالب'); return; }
    const last = s.attendance[s.attendance.length - 1];
    let statusText = last.status === 'present' ? 'حاضرًا' : last.status === 'absent' ? 'غائبًا' : 'متأخرًا';
    const msg = `تحية طيبة من مستر فادي فرح.\nنود إحاطتكم علماً بأن الطالب/ة (${s.name}) كان (${statusText}) في حصة يوم التاريخ المحدد بـ ${last.date}. يرجى المتابعة.`;
    sendWhatsApp(s.parentPhone, msg);
  });
  document.getElementById('waPay').addEventListener('click', () => {
    if(!s.payments || !s.payments.length) { toast('لا يوجد سجل مصروفات مسجل'); return; }
    const last = s.payments[s.payments.length - 1];
    const msg = `تحية طيبة من مستر فادي فرح.\nتم استلام مبلغ قدره ${last.amount} جنيه مقابل (${last.term}) للطالب/ة (${s.name}) بتاريخ ${last.date || 'اليوم'}. شكراً لكم.`;
    sendWhatsApp(s.parentPhone, msg);
  });

  document.getElementById('attForm').addEventListener('submit', async (e)=>{
    e.preventDefault(); const date = document.getElementById('attDate').value; const status = document.getElementById('attStatus').value;
    s.attendance = s.attendance||[]; s.attendance.push({date,status}); await saveStudent(code, s); renderStudentEditor();
  });
  document.getElementById('examForm').addEventListener('submit', async (e)=>{
    e.preventDefault(); const name = document.getElementById('examName').value.trim(); const date = document.getElementById('examDate').value; const score = document.getElementById('examScore').value; const max = document.getElementById('examMax').value;
    s.exams = s.exams||[]; s.exams.push({name,date,score,max}); await saveStudent(code, s); renderStudentEditor();
  });
  document.getElementById('payForm').addEventListener('submit', async (e)=>{
    e.preventDefault(); const term = document.getElementById('payTerm').value.trim(); const amount = document.getElementById('payAmount').value; const status = document.getElementById('payStatus').value; const date = document.getElementById('payDate').value;
    s.payments = s.payments||[]; s.payments.push({term,amount,status,date}); await saveStudent(code, s); renderStudentEditor();
  });
  $app.querySelectorAll('[data-del-att]').forEach(b=>b.addEventListener('click', async ()=>{ s.attendance.splice(Number(b.dataset.delAtt),1); await saveStudent(code,s); renderStudentEditor(); }));
  $app.querySelectorAll('[data-del-exam]').forEach(b=>b.addEventListener('click', async ()=>{ s.exams.splice(Number(b.dataset.delExam),1); await saveStudent(code,s); renderStudentEditor(); }));
  document.getElementById('delStudent').addEventListener('click', async ()=>{
    if(!confirm('متأكد من حذف الطالب نهائيًا؟')) return;
    let idx = await getIndex(); idx = idx.filter(x=>x.code!==code); await saveIndex(idx); await dbDelete('students/'+code);
    toast('تم الحذف'); state.view='teacherPanel'; render();
  });
}

/* ---------------- Router & Boot ---------------- */
function render(){
  if(state.view==='home') renderHome();
  else if(state.view==='report') renderReport();
  else if(state.view==='teacherLogin') renderTeacherLogin();
  else if(state.view==='teacherPanel') renderTeacherPanel();
  else if(state.view==='studentEditor') renderStudentEditor();
}
(async function boot(){ buildBgFx(); const params = new URLSearchParams(location.search); const codeParam = params.get('code'); if(codeParam){ await openReport(codeParam.toUpperCase()); } else render(); })();
</script>
</body>
</html>
