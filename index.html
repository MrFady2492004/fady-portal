<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف الطالب — متابعة أولياء الأمور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#152238;
    --ink2:#23375A;
    --paper:#EEF0EA;
    --paper2:#F7F8F4;
    --card:#FFFFFF;
    --line:#D8D4C4;
    --brass:#A87C2E;
    --brass-light:#D9B568;
    --good:#2F7A52;
    --good-bg:#E6F2EB;
    --warn:#B23A2E;
    --warn-bg:#FBEAE8;
    --muted:#5B6470;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
    background-image:
      linear-gradient(var(--paper) 1px, transparent 1px);
    background-size: 100% 42px;
    background-attachment:local;
  }
  #app{max-width:980px;margin:0 auto;padding:24px 18px 60px;}
  h1,h2,h3{font-family:'Cairo',sans-serif;margin:0;}
  .eyebrow{
    font-family:'Tajawal',sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:.5px;
    color:var(--brass);
    text-transform:uppercase;
  }
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  /* ===== Header / brand ===== */
  .brandbar{
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;padding:18px 22px;background:var(--ink);
    border-radius:var(--radius);color:#fff;position:relative;overflow:hidden;
    margin-bottom:22px;
  }
  .brandbar svg.compass{position:absolute;left:-30px;top:-40px;opacity:.10;width:180px;height:180px;}
  .brand-id{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}
  .avatar{
    width:56px;height:56px;border-radius:50%;
    background:linear-gradient(135deg,var(--brass-light),var(--brass));
    display:flex;align-items:center;justify-content:center;
    font-family:'Cairo',sans-serif;font-weight:800;font-size:20px;color:var(--ink);
    flex-shrink:0;border:2px solid rgba(255,255,255,.35);
    overflow:hidden;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .brand-name{font-size:18px;font-weight:800;}
  .brand-sub{font-size:12.5px;color:#C9D2E0;margin-top:2px;}
  .tagline{
    position:relative;z-index:1;text-align:left;
    font-family:'Cairo',sans-serif;font-weight:800;font-size:14px;
    color:var(--brass-light);line-height:1.5;flex-shrink:0;max-width:160px;
  }
  .tagline span{display:block;font-size:11.5px;font-weight:500;color:#C9D2E0;margin-top:2px;}

  /* ===== Social links row ===== */
  .social-row{
    display:flex;justify-content:center;gap:10px;margin:0 0 18px;flex-wrap:wrap;
  }
  .social-link{
    display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;
    background:var(--card);border:1px solid var(--line);color:var(--ink);
    font-size:13px;font-weight:700;text-decoration:none;transition:border-color .15s, color .15s;
  }
  .social-link:hover{border-color:var(--brass);color:var(--brass);}

  /* ===== Generic card ===== */
  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:22px;margin-bottom:18px;
    box-shadow:0 1px 2px rgba(21,34,56,.04);
  }
  .card-title{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--brass);}

  /* ===== Home / code entry ===== */
  .hero{text-align:center;padding:36px 16px 8px;}
  .hero h1{font-size:26px;font-weight:900;margin-bottom:8px;}
  .hero p{color:var(--muted);font-size:14.5px;max-width:480px;margin:0 auto;}
  .code-form{display:flex;gap:8px;max-width:380px;margin:26px auto 6px;}
  .code-form input{
    flex:1;padding:13px 16px;border-radius:10px;border:1.5px solid var(--line);
    font-size:18px;letter-spacing:3px;text-align:center;font-weight:700;
    background:var(--paper2);color:var(--ink);
  }
  .code-form input:focus{outline:none;border-color:var(--brass);}
  .btn{
    padding:12px 20px;border-radius:10px;border:none;font-weight:700;font-size:14.5px;
    background:var(--ink);color:#fff;transition:opacity .15s;
  }
  .btn:hover{opacity:.88;}
  .btn-brass{background:var(--brass);color:#fff;}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
  .btn-danger{background:var(--warn);color:#fff;}
  .btn-sm{padding:8px 13px;font-size:13px;border-radius:8px;}
  .hint{font-size:12.5px;color:var(--muted);text-align:center;margin-top:10px;}
  .footer-link{display:block;text-align:center;margin-top:34px;font-size:13px;color:var(--muted);text-decoration:underline;cursor:pointer;}

  /* ===== Stat row ===== */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;text-align:center;}
  .stat .num{font-family:'Cairo',sans-serif;font-weight:900;font-size:26px;}
  .stat .lbl{font-size:12.5px;color:var(--muted);margin-top:4px;}
  .stat.good .num{color:var(--good);}
  .stat.warn .num{color:var(--warn);}

  /* ===== Lists / rows ===== */
  .row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 4px;border-bottom:1px dashed var(--line);font-size:14px;
  }
  .row:last-child{border-bottom:none;}
  .row .meta{color:var(--muted);font-size:12.5px;}
  .badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;}
  .badge.present{background:var(--good-bg);color:var(--good);}
  .badge.absent{background:var(--warn-bg);color:var(--warn);}
  .badge.paid{background:var(--good-bg);color:var(--good);}
  .badge.due{background:var(--warn-bg);color:var(--warn);}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{font-family:'Cairo',sans-serif;font-size:12.5px;color:var(--muted);text-align:right;padding:8px 6px;border-bottom:2px solid var(--line);}
  td{padding:9px 6px;border-bottom:1px dashed var(--line);}
  tr:last-child td{border-bottom:none;}

  /* ===== Forms ===== */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:10px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
  .field input,.field select{
    width:100%;padding:9px 10px;border-radius:8px;border:1.3px solid var(--line);
    background:var(--paper2);font-size:13.5px;color:var(--ink);
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--brass);}

  .topnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .back{font-size:13.5px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;}
  .back:hover{color:var(--ink);}

  .student-pick{display:flex;align-items:center;justify-content:space-between;padding:13px 6px;border-bottom:1px dashed var(--line);}
  .student-pick:last-child{border-bottom:none;}
  .student-pick .nm{font-weight:700;font-size:14.5px;}
  .student-pick .cd{font-family:'Cairo',sans-serif;font-weight:800;letter-spacing:2px;color:var(--brass);font-size:13px;}

  .pin-box{max-width:260px;margin:0 auto;}
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:30px;
    font-size:13.5px;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,.2);
    opacity:0;pointer-events:none;transition:opacity .25s, bottom .25s;
  }
  .toast.show{opacity:1;bottom:30px;}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:18px 0;}

  @media(max-width:560px){
    .stats{grid-template-columns:1fr 1fr;}
    .code-form{flex-direction:column;}
  }

  /* ===== Animated background (خلفية متحركة) ===== */
  #bgfx{
    position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
  }
  #bgfx .bigCompass{
    position:absolute; top:-12vw; right:-12vw; width:46vw; height:46vw; max-width:520px; max-height:520px;
    opacity:.05; animation: spin 120s linear infinite;
  }
  #bgfx .bigCompass2{
    position:absolute; bottom:-16vw; left:-16vw; width:38vw; height:38vw; max-width:420px; max-height:420px;
    opacity:.045; animation: spin 160s linear infinite reverse;
  }
  #bgfx .route{
    position:absolute; width:140%; left:-20%; opacity:.07; stroke:var(--brass);
  }
  #bgfx .route1{ top:14%; animation: driftX 38s ease-in-out infinite; }
  #bgfx .route2{ top:62%; animation: driftX 46s ease-in-out infinite reverse; }
  #bgfx .spark{
    position:absolute; color:var(--brass); opacity:0;
    font-size:14px; animation: floatUp linear infinite;
  }
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @keyframes driftX{ 0%,100%{transform:translateX(0);} 50%{transform:translateX(22px);} }
  @keyframes floatUp{
    0%{ transform:translateY(0) scale(.7); opacity:0; }
    10%{ opacity:.18; }
    90%{ opacity:.12; }
    100%{ transform:translateY(-92vh) scale(1); opacity:0; }
  }
  #app{position:relative; z-index:1;}
  .brandbar, .toast{ position:relative; z-index:1; }
  @media (prefers-reduced-motion: reduce){
    #bgfx .bigCompass, #bgfx .bigCompass2, #bgfx .route1, #bgfx .route2, #bgfx .spark{ animation:none !important; }
  }
  .seg{display:flex;gap:6px;}
  .seg-btn{padding:6px 12px;border-radius:7px;border:1.5px solid var(--line);background:transparent;color:var(--ink);font-size:12.5px;font-family:inherit;cursor:pointer;font-weight:700;}
  .seg-btn.active[data-status="present"]{background:var(--good-bg);color:var(--good);border-color:var(--good);}
  .seg-btn.active[data-status="absent"]{background:var(--warn-bg);color:var(--warn);border-color:var(--warn);}

  /* ===== بطاقة النجوم ===== */
  .stars-card-inner{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .stars-big-num{font-family:'Cairo',sans-serif;font-weight:900;font-size:28px;color:var(--brass);}
  .stars-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
  .stars-badge.gold{background:#FFF4D6;color:#8B6300;}
  .stars-badge.green{background:var(--good-bg);color:var(--good);}
  .stars-badge.gray{background:#F3F3F3;color:#5B6470;}
  .stars-row-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px dashed var(--line);}
  .stars-row-item:last-child{border-bottom:none;}
  .stars-row-item .s-lbl{font-size:13px;color:var(--muted);min-width:110px;}
  .stars-all{display:flex;gap:3px;margin-top:10px;flex-wrap:wrap;align-items:center;}
  /* ===== بطاقة المشاركة (canvas) ===== */
  #shareCardCanvas{width:100%;border-radius:12px;border:1px solid var(--line);display:none;margin-bottom:12px;}
  .share-info{padding:10px 14px;background:#EEF5FF;border:1px solid #C0D4F0;border-radius:8px;font-size:13px;color:#1A4A8A;margin-bottom:10px;}

  #certOverlay{position:fixed;inset:0;background:rgba(20,16,10,.72);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
  #certOverlay .cert-actions{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;}
  .cert-paper{position:relative;width:100%;max-width:720px;aspect-ratio:1.41/1;font-family:'Cairo',sans-serif;border-radius:8px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.45);}
  .cert-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .cert-name-overlay{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:clamp(20px,4vw,32px);font-weight:900;color:#B8860B;text-shadow:0 1px 3px rgba(255,255,255,.6);white-space:nowrap;width:80%;}
  @media print{
    body *{visibility:hidden;}
    #certOverlay, #certOverlay *{visibility:visible;}
    #certOverlay{position:absolute;inset:0;background:#fff;padding:0;}
    #certOverlay .cert-actions{display:none;}
    .cert-paper{box-shadow:none;max-width:100%;border-radius:0;}
  }
</style>
</head>

/* ---------------- Storage helpers (Firebase Realtime Database) ---------------- */
const DB_URL = 'https://fady-portal01-default-rtdb.firebaseio.com';

async function dbGet(path){
  try{
    const r = await fetch(DB_URL + '/' + path + '.json');
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}
async function dbSet(path, value){
  try{
    const r = await fetch(DB_URL + '/' + path + '.json', {
      method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(value)
    });
    return r.ok;
  }catch(e){ return false; }
}
async function dbDelete(path){
  try{
    const r = await fetch(DB_URL + '/' + path + '.json', { method:'DELETE' });
    return r.ok;
  }catch(e){ return false; }
}

async function getIndex(){
  const v = await dbGet('index');
  return v || [];
}
async function saveIndex(list){
  const ok = await dbSet('index', list);
  if(!ok) toast('حصل خطأ في الحفظ — اتأكد من اتصال الإنترنت');
}
async function getStudent(code){
  return await dbGet('students/'+code);
}
async function saveStudent(code, data){
  const ok = await dbSet('students/'+code, data);
  if(!ok) toast('حصل خطأ في الحفظ — اتأكد من اتصال الإنترنت');
}
/* سجل التغييرات: بنضيف entry في s.log كل ما حصل تعديل على بيانات الطالب */
function addLog(s, msg){
  s.log = s.log||[];
  const now = new Date();
  const dateStr = now.toLocaleDateString('ar-EG',{day:'numeric',month:'long',year:'numeric'});
  const timeStr = now.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  s.log.unshift({ msg, dateStr, timeStr, ts: now.getTime() });
  if(s.log.length > 30) s.log = s.log.slice(0,30);
}

/* سلة المحذوفات: قبل أي حذف نهائي لطالب، بناخد نسخة منه هنا عشان نقدر نسترجعه لو حصل غلط */
async function getTrash(){
  const v = await dbGet('trash');
  return v || [];
}
async function saveTrash(list){
  const ok = await dbSet('trash', list);
  if(!ok) toast('حصل خطأ في الحفظ — اتأكد من اتصال الإنترنت');
}
async function moveStudentToTrash(code, studentData, indexEntry){
  const trash = await getTrash();
  trash.push({ code, data: studentData, indexEntry, deletedAt: new Date().toISOString() });
  await saveTrash(trash);
}
async function restoreStudentFromTrash(trashIdx){
  const trash = await getTrash();
  const item = trash[trashIdx];
  if(!item) return false;
  const idx = await getIndex();
  if(idx.find(x=>x.code===item.code)){ toast('فيه كود زي ده مستخدم دلوقتي — مينفعش الاسترجاع'); return false; }
  idx.push(item.indexEntry || {code:item.code, name:item.data.name, klass:item.data.klass});
  await saveIndex(idx);
  await saveStudent(item.code, item.data);
  trash.splice(trashIdx,1);
  await saveTrash(trash);
  return true;
}
async function purgeFromTrash(trashIdx){
  const trash = await getTrash();
  trash.splice(trashIdx,1);
  await saveTrash(trash);
}

async function syncStudentPoints(code, exams){

/* بعد أي تعديل على حضور/درجات طالب، بنحدّث علم الخطر بتاعه في الفهرس عشان يظهر في قائمة الطلاب */
async function syncStudentRisk(code, student){

}

function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<5;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

/* ---------------- Calc helpers ---------------- */
function attendanceStats(att){
  att = att||[];
  const total = att.length;
  const present = att.filter(a=>a.status==='present').length;
  const absent = att.filter(a=>a.status==='absent').length;
    const pct = total? Math.round((present/total)*100) : 100;
  return {total,present,absent,pct};
}
function examsAvg(exams){
  exams = exams||[];
  if(!exams.length) return null;
  let sumPct=0;
  exams.forEach(e=> sumPct += (Number(e.score)/Number(e.max))*100 );
  return Math.round(sumPct/exams.length);
}
/* نظام النجوم: 100%=3 نجوم، 95%=2 نجوم، 90%=1 نجمة */
function examPoints(score, max){
  const pct = (Number(score)/Number(max))*100;
  if(pct>=100) return 3;
  if(pct>=95) return 2;
  if(pct>=90) return 1;
  return 0;
}
function examStars(score, max){
  return '⭐'.repeat(examPoints(score, max));
}
function totalPoints(exams){
  exams = exams||[];
  return exams.reduce((sum,e)=> sum + examPoints(e.score, e.max), 0);
}
/* نجمة الحضور: إذا كان الحضور 90%+ */
function attStar(attPct){ return attPct >= 90 ? 1 : 0; }
/* إجمالي النجوم شامل الحضور */
function totalStarsWithAtt(exams, attPct){
  return totalPoints(exams) + attStar(attPct);
}
/* SVG نجمة واحدة */
function starSVG(filled, color, size){
  color = color||'#D9A52A'; size = size||18;
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${filled?color:'none'}" stroke="${color}" stroke-width="1.5" style="vertical-align:middle;flex-shrink:0;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
}
function starsRowHTML(count, maxStars, color, size){
  maxStars = maxStars||3; color = color||'#D9A52A'; size = size||18;
  return Array.from({length:maxStars}).map((_,i)=>starSVG(i<count,color,size)).join('');
}
/* مؤشر الخطر: 3 غيابات متتالية (آخر شيء مسجّل) أو 3 درجات ضعيفة متتالية (أقل من 65%) */
function riskStatus(s){
  const att = (s.attendance||[]);
  const exams = (s.exams||[]);
  let absentStreak = 0;
  for(let i=att.length-1;i>=0;i--){
    if(att[i].status==='absent') absentStreak++; else break;
  }
  let weakStreak = 0;
  for(let i=exams.length-1;i>=0;i--){
    const pct = (Number(exams[i].score)/Number(exams[i].max))*100;
    if(pct < 65) weakStreak++; else break;
  }
  const reasons = [];
  if(absentStreak>=3) reasons.push(`غاب ${absentStreak} مرات على التوالي`);
  if(weakStreak>=3) reasons.push(`جاب درجة ضعيفة ${weakStreak} مرات على التوالي`);
  return { atRisk: reasons.length>0, reasons, absentStreak, weakStreak };
}

function isParentVerified(s){

}

/* ---- تجميع الغياب حسب الشهر للعرض أمام ولي الأمر ---- */
function groupAttendanceByMonth(att){
  att = (att||[]).slice().sort((a,b)=> a.date < b.date ? 1 : -1);
  const months = {};
  att.forEach(a=>{
    const [y,m] = (a.date||'').split('-');
    if(!y||!m) return;
    const key = y+'-'+m;
    if(!months[key]) months[key] = {key, label: monthLabel(y,m), items:[]};
    months[key].items.push(a);
  });
  return Object.values(months).sort((a,b)=> a.key < b.key ? 1 : -1);
}
function monthLabel(y,m){
  const names = ['يناير','فبراير','مارس','ابريل','مايو','يونيو','يوليو','اغسطس','سبتمبر','اكتوبر','نوفمبر','ديسمبر'];
  return names[parseInt(m,10)-1] + ' ' + y;
}

function paymentsSummary(payments){
  payments = payments||[];
  let paid=0, due=0;
  payments.forEach(p=>{ if(p.status==='paid') paid+=Number(p.amount); else due+=Number(p.amount); });
  return {paid,due};
}
function fmtDate(d){
  if(!d) return '—';
  const parts = String(d).split('-');
  if(parts.length===3 && parts[0].length===4) return `${parts[2]}-${parts[1]}-${parts[0]}`;
  return d;
}

/* حساب إحصائيات لوحة التحكم العامة: عدد الطلاب، إيراد الشهر، المتأخرين في الدفع، متوسط الحضور */
async function computeDashboardStats(idx){
  const now = new Date();
  const curMonth = now.getMonth(), curYear = now.getFullYear();
  const curDay = now.getDate();
  let monthRevenue = 0, totalDue = 0, attSum = 0, attCount = 0;
  const dueList = [];
  const todaysBirthdays = [];
  for(const entry of idx){
    const st = await getStudent(entry.code);
    if(!st) continue;
    const pays = st.payments||[];
    pays.forEach(p=>{
      if(p.status==='paid' && p.date){
        const d = new Date(p.date);
        if(!isNaN(d) && d.getMonth()===curMonth && d.getFullYear()===curYear) monthRevenue += Number(p.amount)||0;
      }
    });
    const paySum = paymentsSummary(pays);
    if(paySum.due>0) dueList.push({name:st.name, code:entry.code, due:paySum.due});
    const att = attendanceStats(st.attendance);
    if(att.total>0){ attSum += att.pct; attCount++; }
    totalDue += paySum.due;
    if(st.birthdate){
      const bd = new Date(st.birthdate);
      if(!isNaN(bd) && bd.getMonth()===curMonth && bd.getDate()===curDay){
        todaysBirthdays.push({name:st.name, code:entry.code, phone:st.parentPhone||''});
      }
    }
  }
  dueList.sort((a,b)=>b.due-a.due);
  return {
    totalStudents: idx.length,
    monthRevenue,
    totalDue,
    avgAtt: attCount ? Math.round(attSum/attCount) : 100,
    dueList: dueList.slice(0,5),
    todaysBirthdays
  };
}

/* رسم بياني خطي لمستوى الطالب في الامتحانات عبر الوقت (نسبة مئوية) */
function examsChartSVG(exams){
  exams = exams||[];
  if(exams.length < 2){
    return `<div class="empty">سجّل امتحانين على الأقل عشان يظهر الرسم البياني</div>`;
  }
  const recent = exams.slice(-12);
  const W = 600, H = 170, padL = 32, padR = 14, padT = 16, padB = 30;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const pts = recent.map(e => Math.max(0, Math.min(100, Math.round((Number(e.score)/Number(e.max))*100))));
  const n = pts.length;
  const stepX = n>1 ? innerW/(n-1) : 0;
  const coords = pts.map((p,i)=>{
    const x = padL + i*stepX;
    const y = padT + innerH - (p/100)*innerH;
    return [x,y];
  });
  const pathD = coords.map((c,i)=> (i===0?'M':'L')+c[0].toFixed(1)+','+c[1].toFixed(1)).join(' ');
  const areaD = pathD + ` L${coords[n-1][0].toFixed(1)},${(padT+innerH).toFixed(1)} L${coords[0][0].toFixed(1)},${(padT+innerH).toFixed(1)} Z`;
  const gridVals = [0,50,100];
  const gridLines = gridVals.map(v=>{
    const y = padT+innerH-(v/100)*innerH;
    return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1" stroke-dasharray="3,3"/>
            <text x="${padL-6}" y="${(y+3).toFixed(1)}" font-size="9" fill="var(--muted)" text-anchor="end">${v}%</text>`;
  }).join('');
  const dots = coords.map((c,i)=>{
    const pct = pts[i];
    const color = pct>=75?'var(--good)':'var(--warn)';
    return `<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="4.5" fill="${color}" stroke="#fff" stroke-width="1.5"/>
            <text x="${c[0].toFixed(1)}" y="${(c[1]-9).toFixed(1)}" font-size="9.5" font-weight="800" fill="var(--ink)" text-anchor="middle">${pct}%</text>`;
  }).join('');
  const labels = recent.map((e,i)=>{
    const x = coords[i][0];
    const lbl = (e.name||'').length>7 ? (e.name||'').slice(0,6)+'…' : (e.name||'');
    return `<text x="${x.toFixed(1)}" y="${H-8}" font-size="9" fill="var(--muted)" text-anchor="middle">${lbl}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;margin:4px 0 16px;">
    ${gridLines}
    <path d="${areaD}" fill="var(--brass-light)" opacity="0.18"/>
    <path d="${pathD}" fill="none" stroke="var(--brass)" stroke-width="2.5"/>
    ${dots}
    ${labels}
  </svg>`;
}

/* رسم بياني بالأعمدة لعدد مرات الحضور/الغياب/التأخير */
function attendanceChartSVG(att){
  att = att||[];
  if(!att.length){
    return `<div class="empty">لسه مفيش سجل حضور </div>`;
  }
  const present = att.filter(a=>a.status==='present').length;
  const absent = att.filter(a=>a.status==='absent').length;
  const max = Math.max(present, absent, 1);
  const W = 600, H = 150, padT = 18, padB = 28, barW = 76, gap = 46;
  const baseY = H - padB;
  const scale = (H - padT - padB) / max;
  const bars = [
    {label:'حاضر', val:present, color:'var(--good)'},
    {label:'غائب', val:absent, color:'var(--warn)'},
  ];
  const totalW = bars.length*barW + (bars.length-1)*gap;
  const startX = (W-totalW)/2;
  const barsSvg = bars.map((b,i)=>{
    const x = startX + i*(barW+gap);
    const h = b.val*scale;
    const y = baseY - h;
    return `
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${Math.max(h,2).toFixed(1)}" rx="7" fill="${b.color}"/>
      <text x="${(x+barW/2).toFixed(1)}" y="${(y-8).toFixed(1)}" font-size="13.5" font-weight="800" fill="var(--ink)" text-anchor="middle">${b.val}</text>
      <text x="${(x+barW/2).toFixed(1)}" y="${H-8}" font-size="11.5" fill="var(--muted)" text-anchor="middle">${b.label}</text>
    `;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;margin:4px 0 16px;">
    <line x1="16" y1="${baseY}" x2="${W-16}" y2="${baseY}" stroke="var(--line)" stroke-width="1.5"/>
    ${barsSvg}
  </svg>`;
}

/* بناء رابط واتساب مع رسالة جاهزة — بيفتح واتساب جاهز للإرسال بضغطة واحدة */
function normalizePhone(phone){
  if(!phone) return '';
  let p = String(phone).replace(/[^\d+]/g,'');
  if(p.startsWith('+')) return p.slice(1);
  if(p.startsWith('00')) return p.slice(2);
  if(p.startsWith('0')) return '20' + p.slice(1); // افتراض رقم مصري محلي
  return p;
}
function waLink(phone, message){
  const p = normalizePhone(phone);
  if(!p) return null;
  return `https://wa.me/${p}?text=${encodeURIComponent(message)}`;
}

/* ---------------- Animated background ---------------- */
function buildBgFx(){
  const el = document.getElementById('bgfx');
  if(!el || el.dataset.built) return;
  el.dataset.built = '1';
  const compassSvg = (cls)=>`
    <svg class="${cls}" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="92" stroke="#A87C2E" stroke-width="1.4"/>
      <circle cx="100" cy="100" r="58" stroke="#A87C2E" stroke-width="1"/>
      <line x1="100" y1="3" x2="100" y2="197" stroke="#A87C2E" stroke-width="1"/>
      <line x1="3" y1="100" x2="197" y2="100" stroke="#A87C2E" stroke-width="1"/>
      <path d="M100 16 L110 100 L100 184 L90 100 Z" fill="#A87C2E"/>
      <path d="M16 100 L100 90 L184 100 L100 110 Z" fill="#A87C2E" opacity=".6"/>
    </svg>`;
  const routeSvg = (cls)=>`
    <svg class="route ${cls}" viewBox="0 0 1000 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 30 Q 150 5, 300 32 T 600 28 T 1000 30" fill="none" stroke-width="2" stroke-dasharray="2 14" stroke-linecap="round"/>
    </svg>`;
  let sparks = '';
  const glyphs = ['✦','✧','⚓','★','Mr.Fady','مستر فادي'];
  for(let i=0;i<10;i++){
    const left = Math.round(Math.random()*96)+'vw';
    const dur = (22+Math.random()*22).toFixed(1)+'s';
    const delay = (-Math.random()*30).toFixed(1)+'s';
    const glyph = glyphs[Math.floor(Math.random()*glyphs.length)];
    const size = (10+Math.random()*10).toFixed(0)+'px';
    sparks += `<span class="spark" style="left:${left};bottom:-5vh;font-size:${size};animation-duration:${dur};animation-delay:${delay};">${glyph}</span>`;
  }
  el.innerHTML = compassSvg('bigCompass') + compassSvg('bigCompass2') + routeSvg('route1') + routeSvg('route2') + sparks;
}

function avatarHTML(){
  return `<div class="avatar avatar-photo">
    <img src="${TEACHER.photo}" alt="${TEACHER.name}"
      onerror="this.style.display='none'; this.parentElement.innerHTML='📷';">
  </div>`;
}

  return `

async function openReport(code){
  const data = await getStudent(code);
  if(!data){ toast(`الكود غير صحيح، تأكد منه مع ${TEACHER.name}`); return; }
  state.code = code; state.student = data; state.view='report';
  history.replaceState(null,'', location.pathname+'?code='+code);
  render();
}

      }
    </div>
  `;
  // بطاقة النجوم لولي الأمر
  (()=>{
    const wrap = document.getElementById('parentStarsWrap');

    const attStats = attendanceStats(s.attendance);
    const exams = s.exams||[];
    const examPts = totalPoints(exams);
    const attPt = attStar(attStats.pct);
    const totalPts = examPts + attPt;

    const W = 800, H = 480;
    const attStats = attendanceStats(s.attendance);
    const exams = s.exams||[];
    const avg = examsAvg(exams);
    const examPts = totalPoints(exams);
    const attPt = attStar(attStats.pct);
    const totalPts = examPts + attPt;
    const lastExam = exams.length ? exams[exams.length-1] : null;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#13222F'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#A87C2E'; ctx.fillRect(0,0,W,6); ctx.fillRect(0,H-6,W,6);
    ctx.direction='rtl'; ctx.textAlign='right';
    ctx.font='bold 15px Tajawal,Cairo,sans-serif'; ctx.fillStyle='#D9B568';
    ctx.fillText(TEACHER.name, W-28, 38);
    ctx.font='13px Tajawal,sans-serif'; ctx.fillStyle='#C9D2E0';
    ctx.fillText(TEACHER.subject, W-28, 58);
    ctx.fillText(TEACHER.phone, W-28, 76);
    const cx=120, cy=160, r=70;

    ctx.restore();
    ctx.beginPath(); ctx.arc(cx,cy,r+3,0,Math.PI*2); ctx.strokeStyle='#A87C2E'; ctx.lineWidth=3; ctx.stroke();
    ctx.direction='rtl'; ctx.textAlign='right';
    ctx.font='bold 26px Cairo,sans-serif'; ctx.fillStyle='#FFFFFF'; ctx.fillText(s.name||'', W-28, 130);
    ctx.font='15px Tajawal,sans-serif'; ctx.fillStyle='#C9D2E0'; ctx.fillText(s.klass||'', W-28, 154);
    ctx.font='bold 20px Cairo,sans-serif'; ctx.fillStyle='#D9A52A';
    ctx.fillText('⭐'.repeat(Math.min(totalPts,12))+'  '+totalPts+' نجمة', W-28, 185);
    function rr(c2,x,y,w,h,rd){ c2.beginPath(); c2.moveTo(x+rd,y); c2.lineTo(x+w-rd,y); c2.quadraticCurveTo(x+w,y,x+w,y+rd); c2.lineTo(x+w,y+h-rd); c2.quadraticCurveTo(x+w,y+h,x+w-rd,y+h); c2.lineTo(x+rd,y+h); c2.quadraticCurveTo(x,y+h,x,y+h-rd); c2.lineTo(x,y+rd); c2.quadraticCurveTo(x,y,x+rd,y); c2.closePath(); c2.fill(); }
    const cards=[{label:'نسبة الحضور',val:attStats.pct+'%'},{label:'متوسط الامتحانات',val:avg!==null?avg+'%':'—'},{label:'آخر امتحان',val:lastExam?lastExam.score+'/'+lastExam.max:'—'},{label:'إجمالي النجوم',val:totalPts+'⭐'}];
    const cW=170,cH=80,cY=300,gap=12;
    const totW=cards.length*cW+(cards.length-1)*gap;
    const startX=(W-totW)/2;
    cards.forEach((c,i)=>{ const x=startX+i*(cW+gap); ctx.fillStyle='#1D3347'; rr(ctx,x,cY,cW,cH,10); ctx.fillStyle='#D9B568'; ctx.font='bold 22px Cairo,sans-serif'; ctx.textAlign='center'; ctx.direction='ltr'; ctx.fillText(c.val,x+cW/2,cY+34); ctx.fillStyle='#9AABB8'; ctx.font='12px Tajawal,sans-serif'; ctx.fillText(c.label,x+cW/2,cY+58); });
    ctx.fillStyle='#0D1921'; ctx.fillRect(0,H-50,W,50);
    ctx.font='13px Tajawal,sans-serif'; ctx.fillStyle='#D9B568'; ctx.textAlign='center'; ctx.direction='rtl';
    ctx.fillText('مستر فادي فرح — مدرس الدراسات الاجتماعية  |  '+TEACHER.phone, W/2, H-20);
    canvas.style.display='block';
    const actDiv=document.getElementById('shareCardActions'); actDiv.style.display='flex';
    toast('تم توليد البطاقة ✅');
  });
  document.getElementById('downloadShareCardBtn').addEventListener('click', ()=>{
    const canvas=document.getElementById('shareCardCanvas');
    const a=document.createElement('a'); a.href=canvas.toDataURL('image/jpeg',0.92);

  document.getElementById('waShareCardBtn').addEventListener('click', ()=>{
    const msg='📊 بطاقة متابعة الطالب\n👤 '+(s.name||'')+'\n📚 '+(s.klass||'')+'\n⭐ شاهد كشف الطالب:\n'+location.href;
    const url=waLink(s.parentPhone||'', msg);
    if(url) window.open(url,'_blank'); else toast('سجّل رقم واتساب الأول');
  });

  document.getElementById('toHome').addEventListener('click', ()=>{
    state.view='home'; history.replaceState(null,'',location.pathname); render();
  });
  document.getElementById('parentPhotoInput').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(!file.type.startsWith('image/')){ toast('اختار ملف صورة صحيح'); return; }
    if(file.size > 4*1024*1024){ toast('الصورة كبيرة أوي — اختار صورة أصغر من 4 ميجا'); return; }
    const reader = new FileReader();
    reader.onload = async ()=>{
      s.photo = reader.result;
      await saveStudent(state.code, s);
      const idx = await getIndex();
      const entry = idx.find(x=>x.code===state.code);
      if(entry){ entry.photo = s.photo; await saveIndex(idx); }
      toast('تم رفع الصورة');
      renderReport();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('parentBirthdateForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const bd = document.getElementById('parentBirthdateInput').value;
    s.birthdate = bd;
    await saveStudent(state.code, s);
    const idx = await getIndex();
    const entry = idx.find(x=>x.code===state.code);
    if(entry){ entry.birthdate = bd; await saveIndex(idx); }
    toast('تم حفظ تاريخ الميلاد');
  });
  document.getElementById('parentWhatsappForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const phone = document.getElementById('parentWhatsappInput').value.trim();
    s.parentPhone = phone;
    await saveStudent(state.code, s);
    const idx = await getIndex();
    const entry = idx.find(x=>x.code===state.code);
    if(entry){ entry.parentPhone = phone; await saveIndex(idx); }
    toast('تم حفظ رقم الواتساب ✅');
    renderReport();
  });
}

    for(const line of lines){
      const cols = line.split(/\t|,/).map(c=>c.trim());

        const match = att.find(a=>a.date===selDate);

/* تصفية الطلاب بالاسم أو الكود (بحث) + الصف */
function filterStudents(list, query, klass){
  list = list||[];
  let out = list;
  if(klass && klass.trim()){
    out = out.filter(s => (s.klass||'').trim() === klass.trim());
  }
  if(query && query.trim()){
    const q = query.trim().toLowerCase();
    out = out.filter(s => (s.name||'').toLowerCase().includes(q) || (s.code||'').toLowerCase().includes(q));
  }
  return out;
}

/* قائمة الصفوف الموجودة فعليًا عند الطلاب، بترتيب الصفوف الستة المعروفة الأول وبعدين أي صف تاني */
function classOptionsFromIndex(idx){
  const set = new Set((idx||[]).map(s=>(s.klass||'').trim()).filter(Boolean));
  const known = CLASS_LEVELS.filter(c=>set.has(c));
  const unknown = [...set].filter(c=>!CLASS_LEVELS.includes(c)).sort();
  return [...known, ...unknown];
}

          ? `<img src="${s.photo}" alt="${s.name}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:1.5px solid var(--line);flex-shrink:0;">`

        <div class="field"><label>المبلغ</label><input type="number" id="payAmount" required></div>
        <div class="field"><label>الحالة</label>
          <select id="payStatus"><option value="paid">مدفوع</option><option value="due">غير مدفوع</option></select>
        </div>
        <div class="field"><label>التاريخ</label><input type="date" id="payDate"></div>
        <button class="btn btn-brass" type="submit">تسجيل</button>
      </form>
      <button class="btn btn-ghost btn-sm" id="waPayBtn" style="margin-top:8px;width:100%;">📱 ابعت لولي الأمر واتساب بحالة المصروفات</button>
      ${ (s.payments&&s.payments.length) ? s.payments.slice().reverse().map((p,ri)=>{
          const i = s.payments.length-1-ri;
          return `<div class="row"><span>${p.term} <span class="meta">— ${fmtDate(p.date)}</span></span><span style="display:flex;align-items:center;gap:8px;"><span class="meta">${p.amount} ج</span><span class="badge ${p.status==='paid'?'paid':'due'}">${p.status==='paid'?'مدفوع':'غير مدفوع'}</span><button class="btn btn-ghost btn-sm" data-del-pay="${i}">حذف</button></span></span></div>`;
        }).join('') : `<div class="empty">لا يوجد سجل مدفوعات بعد</div>` }
    </div>

    <div class="card">
      <button class="btn btn-danger" id="delStudent">حذف الطالب</button>
    </div>
  `;

  document.getElementById('toPanel').addEventListener('click', ()=>{ state.view='teacherPanel'; render(); });

  document.getElementById('editInfoForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const newName = document.getElementById('editStudentName').value.trim();
    const newClass = document.getElementById('editStudentClass').value.trim();
    if(!newName){ toast('اكتب اسم الطالب'); return; }
    s.name = newName; s.klass = newClass;
    await saveStudent(code, s);
    const idx = await getIndex();
    const entry = idx.find(x=>x.code===code);
    if(entry){ entry.name = newName; entry.klass = newClass; await saveIndex(idx); }
    toast('تم حفظ بيانات الطالب');
    renderStudentEditor();
  });
  document.getElementById('copyLink').addEventListener('click', async ()=>{
    try{ await navigator.clipboard.writeText(link); toast('تم نسخ الرابط'); }
    catch(e){ toast('انسخ الكود يدويًا: '+code); }
  });

  document.getElementById('genCertBtn').addEventListener('click', ()=>{
    showCertificate(s);
  });

  document.getElementById('studentPhotoInput').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(!file.type.startsWith('image/')){ toast('اختار ملف صورة صحيح'); return; }
    if(file.size > 4*1024*1024){ toast('الصورة كبيرة أوي — اختار صورة أصغر من 4 ميجا'); return; }
    const reader = new FileReader();
    reader.onload = async ()=>{
      s.photo = reader.result;
      await saveStudent(code, s);
      const idx = await getIndex();
      const entry = idx.find(x=>x.code===code);
      if(entry){ entry.photo = s.photo; await saveIndex(idx); }
      toast('تم رفع الصورة');
      renderStudentEditor();
    };
    reader.readAsDataURL(file);
  });

  const removePhotoBtn = document.getElementById('removeStudentPhoto');
  if(removePhotoBtn){
    removePhotoBtn.addEventListener('click', async ()=>{
      delete s.photo;
      await saveStudent(code, s);
      const idx = await getIndex();
      const entry = idx.find(x=>x.code===code);
      if(entry){ delete entry.photo; await saveIndex(idx); }
      toast('تم حذف الصورة');
      renderStudentEditor();
    });
  }

  document.getElementById('parentPhoneForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const phone = document.getElementById('parentPhoneInput').value.trim();
    s.parentPhone = phone;
    await saveStudent(code, s);
    toast('تم حفظ رقم ولي الأمر');
    renderStudentEditor();
  });

  document.getElementById('attForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const date = document.getElementById('attDate').value;
    const status = document.getElementById('attStatus').value;
    if(!date) return;
    s.attendance = s.attendance||[]; s.attendance.push({date,status});
    addLog(s, `سجّل حضور يوم ${fmtDate(date)} — ${status==='present'?'حاضر':'غائب'}`);
    await saveStudent(code, s); await syncStudentRisk(code, s);
    renderStudentEditor();
  });
  document.getElementById('waAttBtn').addEventListener('click', ()=>{
    if(!s.parentPhone){ toast('سجّل رقم ولي الأمر الأول من فوق'); return; }
    const date = document.getElementById('attDate').value || 'النهاردة';
    const status = document.getElementById('attStatus').value;
    const statusTxt = status==='present' ? 'كان حاضر' : 'كان غايب';
    const msg = `حضرتك ولي أمر الطالب/ة ${s.name}\nبخصوص حصة يوم ${fmtDate(date)}: الطالب ${statusTxt}.\n— ${TEACHER.name}\n\nيمكنك متابعة مستوى ابنك من خلال اللينك الاتي :\n${link}`;
    const waLinkUrl = waLink(s.parentPhone, msg);
    if(waLinkUrl) window.open(waLinkUrl, '_blank');
  });

  document.getElementById('examForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const name = document.getElementById('examName').value.trim();
    const date = document.getElementById('examDate').value;
    const score = document.getElementById('examScore').value;
    const max = document.getElementById('examMax').value;
    if(!name||score===''||max==='') return;
    s.exams = s.exams||[]; s.exams.push({name,date,score,max});
    addLog(s, `أضاف درجة ${name}: ${score} من ${max}`);
    await saveStudent(code, s); await syncStudentPoints(code, s.exams); await syncStudentRisk(code, s);
    renderStudentEditor();
  });
  document.getElementById('waExamBtn').addEventListener('click', ()=>{
    if(!s.parentPhone){ toast('سجّل رقم ولي الأمر الأول من فوق'); return; }
    const name = document.getElementById('examName').value.trim() || 'الامتحان';
    const score = document.getElementById('examScore').value;
    const max = document.getElementById('examMax').value || '100';
    if(score===''){ toast('اكتب الدرجة الأول'); return; }
    const msg = `حضرتك ولي أمر الطالب/ة ${s.name}\nالطالب جاب في ${name}: ${score} من ${max}.\n— ${TEACHER.name}\n\nيمكنك متابعة مستوى ابنك من خلال اللينك الاتي :\n${link}`;
    const waLinkUrl = waLink(s.parentPhone, msg);
    if(waLinkUrl) window.open(waLinkUrl, '_blank');
  });

  document.getElementById('payForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const term = document.getElementById('payTerm').value.trim();
    const amount = document.getElementById('payAmount').value;
    const status = document.getElementById('payStatus').value;
    const date = document.getElementById('payDate').value;
    if(!term||amount==='') return;
    s.payments = s.payments||[]; s.payments.push({term,amount,status,date});
    addLog(s, `سجّل مدفوعات: ${term} — ${amount} جنيه (${status==='paid'?'مدفوع':'غير مدفوع'})`);
    await saveStudent(code, s); renderStudentEditor();
  });
  document.getElementById('waPayBtn').addEventListener('click', ()=>{
    if(!s.parentPhone){ toast('سجّل رقم ولي الأمر الأول من فوق'); return; }
    const term = document.getElementById('payTerm').value.trim() || 'المصروفات';
    const amount = document.getElementById('payAmount').value;
    const status = document.getElementById('payStatus').value;
    if(amount===''){ toast('اكتب المبلغ الأول'); return; }
    const statusTxt = status==='paid' ? `تم دفع ${amount} جنيه` : `متبقي عليه ${amount} جنيه`;
    const msg = `حضرتك ولي أمر الطالب/ة ${s.name}\nبخصوص ${term}: ${statusTxt}.\n— ${TEACHER.name}\n\nيمكنك متابعة مستوى ابنك من خلال اللينك الاتي :\n${link}`;
    const waLinkUrl = waLink(s.parentPhone, msg);
    if(waLinkUrl) window.open(waLinkUrl, '_blank');
  });
  $app.querySelectorAll('[data-del-att]').forEach(b=>b.addEventListener('click', async ()=>{
    const delIdx4=Number(b.dataset.delAtt); addLog(s,`حذف سجل حضور يوم ${fmtDate(s.attendance[delIdx4]?.date||'')}`); s.attendance.splice(delIdx4,1); await saveStudent(code,s); await syncStudentRisk(code, s); renderStudentEditor();
  }));
  $app.querySelectorAll('[data-del-exam]').forEach(b=>b.addEventListener('click', async ()=>{
    const delIdx5=Number(b.dataset.delExam); addLog(s,`حذف درجة امتحان: ${s.exams[delIdx5]?.name||''}`); s.exams.splice(delIdx5,1); await saveStudent(code,s); await syncStudentPoints(code, s.exams); await syncStudentRisk(code, s); renderStudentEditor();
  }));
  $app.querySelectorAll('[data-del-pay]').forEach(b=>b.addEventListener('click', async ()=>{
    const delIdx6=Number(b.dataset.delPay); addLog(s,`حذف مدفوعات: ${s.payments[delIdx6]?.term||''}`); s.payments.splice(delIdx6,1); await saveStudent(code,s); renderStudentEditor();
  }));
  document.getElementById('delStudent').addEventListener('click', async ()=>{
    if(!confirm('متأكد من حذف الطالب؟ هتقدر تسترجعه بعدين من سلة المحذوفات.')) return;
    let idx = await getIndex();
    const indexEntry = idx.find(x=>x.code===code);
    idx = idx.filter(x=>x.code!==code);
    await saveIndex(idx);
    await moveStudentToTrash(code, s, indexEntry);
    await dbDelete('students/'+code);
    toast('تم نقل الطالب لسلة المحذوفات — تقدر تسترجعه من لوحة المعلم');
    state.view='teacherPanel'; render();
  });
}

function render(){
  if(state.view==='home') renderHome();
  else if(state.view==='report') renderReport();
  else if(state.view==='teacherLogin') renderTeacherLogin();
  else if(state.view==='teacherPanel') renderTeacherPanel();
  else if(state.view==='studentEditor') renderStudentEditor();
}

/* ---------------- Boot ---------------- */
(async function boot(){
  buildBgFx();
  const params = new URLSearchParams(location.search);
  const codeParam = params.get('code');
  if(codeParam){ await openReport(codeParam.toUpperCase()); }
  else render();
})();
</script>
</body>
</html>
